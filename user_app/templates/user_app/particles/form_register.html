<div class="auth-card">
    <div class="auth-tabs">
        <a href="#" class="tab active" data-url="{% url 'form-register' %}">Реєстрація</a>
        <a href="#" class="tab" data-url="{% url 'form-login' %}">Авторизація</a>
    </div>

    <h2 class="auth-title">Приєднуйся до World IT</h2>

    <form method="post" action="{% url 'register' %}" class="auth-form">
        {% csrf_token %}
        {{ register_form.as_p }}
        <button type="submit">Створити акаунт</button>
    </form>
</div>
