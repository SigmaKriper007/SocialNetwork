{% load static %}
<div id="group-modal" class="group-modal-overlay" hidden>
    <div class="group-modal-box">

        <!-- КРОК 1 -->
        <div id="group-step-users">
            <button id="close-group-modal" class="group-modal-close" type="button">×</button>
            <h2 class="group-modal-title">Нова група</h2>

            <div class="group-modal-search-wrap">
                <img class="group-modal-search-icon" src="{% static 'chat_app/images/search.svg' %}" alt="">
                <input class="group-modal-search" type="text" id="group-search" placeholder="Пошук">
            </div>

            <p class="group-modal-count">Вибрано: <span id="selected-count">0</span> <span id="group-min-hint" class="group-modal-min-hint">— оберіть мінімум 2</span></p>

            <div class="group-users-list">
                {% for group in friends_grouped %}
                    <div class="group-letter-label">{{ group.letter }}</div>
                    {% for friend in group.friends %}
                    <label class="group-user-row">
                        <input class="group-user-checkbox" type="checkbox" value="{{ friend.id }}" data-user-name="{{ friend.username|default:friend.email }}" hidden>
                        <div class="group-user-avatar">
                            {% if friend.avatar %}
                                <img src="{{ friend.avatar.url }}" alt="">
                            {% else %}
                                {{ friend.username|default:friend.email|slice:":2"|upper }}
                            {% endif %}
                        </div>
                        <span class="group-user-name">{{ friend.username|default:friend.email }}</span>
                        <div class="group-user-check"></div>
                    </label>
                    {% endfor %}
                {% endfor %}
            </div>

            <div class="group-modal-actions">
                <button id="cancel-group-modal" class="group-modal-btn group-modal-btn--cancel" type="button">
                    <img src="{% static 'chat_app/images/Stop.svg' %}" alt="Скасувати">
                </button>
                <button id="next-group-step" class="group-modal-btn group-modal-btn--primary" type="button" disabled>
                    <img src="{% static 'chat_app/images/Continue.svg' %}" alt="Далі">
                </button>
            </div>
        </div>

        <!-- КРОК 2 -->
        <div id="group-step-name" hidden>
            <button id="close-group-name-modal" class="group-modal-close" type="button">×</button>
            <h2 class="group-modal-title">Нова група</h2>

            <label class="group-modal-name-label">Назва</label>
            <input id="group-name" class="group-modal-name-input" type="text" placeholder="Введіть назву">

            <div class="group-modal-avatar-wrap">
                <div class="group-modal-avatar" id="group-avatar-preview">НГ</div>
                <div class="group-modal-avatar-btns">
                    <input type="file" id="group-avatar-input" accept="image/*" style="display: none;">
                    <button type="button" class="group-avatar-btn" id="btn-add-avatar">+ Додайте фото</button>
                    <button type="button" class="group-avatar-btn" id="btn-choose-avatar">
                        <img src="{% static 'chat_app/images/Gallery.svg' %}" alt=""> Оберіть фото
                    </button>
                </div>
            </div>

            <p class="group-modal-count">Учасники</p>
            <div id="selected-users-list" class="group-users-list"></div>

            <div class="group-modal-actions">
                <button id="back-group-step" class="group-modal-btn group-modal-btn--cancel" type="button">
                    <img src="{% static 'images/BackButton.svg' %}" alt="Назад">
                </button>
                <button id="create-group" class="group-modal-btn group-modal-btn--primary" type="button">
                    <img src="{% static 'images/CreateGroup2.svg' %}" alt="Створити групу">
                </button>
            </div>
        </div>

    </div>
</div>
